<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resumen Pendiente</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background-color: #f4f7f6; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            text-align: center; 
        }
        .card { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            max-width: 400px; 
            width: 90%;
        }
        h1 { color: #555; font-size: 1.5rem; margin-bottom: 15px; }
        p { color: #777; margin-bottom: 30px; line-height: 1.5; font-size: 1rem; }
        .btn-retroceder { 
            background-color: #1da1f2; 
            color: white; 
            text-decoration: none; 
            padding: 12px 25px; 
            border-radius: 8px; 
            font-size: 1rem; 
            font-weight: bold; 
            transition: background 0.3s; 
            display: inline-block;
        }
        .btn-retroceder:hover { background-color: #1a91da; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚧 Resumen pendiente de elaboración 🚧</h1>
              
        <a href="index.html" class="btn-retroceder" onclick="if(window.history.length > 1 && window.opener == null){ window.history.back(); return false; } else if(window.opener != null){ window.close(); return false; }">Retroceder</a>
    </div>
</body>
</html>
